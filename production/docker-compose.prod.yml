# ClinicalVision AI — Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This override:
#   - Maps frontend to ports 80 & 443 (standard HTTP/HTTPS)
#   - Removes pgAdmin entirely
#   - Removes exposed DB/Redis ports (only internal network)
#   - Mounts SSL certificates

services:
  db:
    ports: !reset []           # Don't expose DB port to host
    
  backend:
    ports: !reset []           # Backend only accessible via nginx proxy
    environment:
      - CORS_ORIGINS=["https://clinicalvision.ai","https://www.clinicalvision.ai"]

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro

  redis:
    ports: !reset []           # Don't expose Redis port to host
