[pytest]
minversion = 6.0
addopts = -ra -q --strict-markers -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external services)
    slow: Slow tests (XAI computation, model inference)
    api: API endpoint tests
    xai: XAI/Explainability specific tests
    gradcam: GradCAM related tests
    lime: LIME related tests
    shap: SHAP related tests
    validation: XAI validation tests
    clinical: Clinical narrative tests

# Timeout for individual tests (seconds)
timeout = 120

# Coverage settings
[coverage:run]
source = app
omit = 
    app/tests/*
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    except ImportError:

# Logging configuration for tests
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# asyncio mode
asyncio_mode = auto
