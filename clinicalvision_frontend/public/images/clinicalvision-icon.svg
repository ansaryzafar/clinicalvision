<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ClinicalVision AI Logo Icon -->
  <!-- Circular dot pattern representing AI neural connections / medical precision -->
  
  <!-- Outer ring of dots -->
  <circle cx="24" cy="4" r="2.5" fill="#3B82F6"/>
  <circle cx="36" cy="8" r="2.5" fill="#3B82F6"/>
  <circle cx="44" cy="18" r="2.5" fill="#60A5FA"/>
  <circle cx="44" cy="30" r="2.5" fill="#60A5FA"/>
  <circle cx="36" cy="40" r="2.5" fill="#3B82F6"/>
  <circle cx="24" cy="44" r="2.5" fill="#3B82F6"/>
  <circle cx="12" cy="40" r="2.5" fill="#3B82F6"/>
  <circle cx="4" cy="30" r="2.5" fill="#60A5FA"/>
  <circle cx="4" cy="18" r="2.5" fill="#60A5FA"/>
  <circle cx="12" cy="8" r="2.5" fill="#3B82F6"/>
  
  <!-- Inner ring of dots -->
  <circle cx="24" cy="12" r="2" fill="#2563EB"/>
  <circle cx="32" cy="16" r="2" fill="#2563EB"/>
  <circle cx="36" cy="24" r="2" fill="#3B82F6"/>
  <circle cx="32" cy="32" r="2" fill="#2563EB"/>
  <circle cx="24" cy="36" r="2" fill="#2563EB"/>
  <circle cx="16" cy="32" r="2" fill="#2563EB"/>
  <circle cx="12" cy="24" r="2" fill="#3B82F6"/>
  <circle cx="16" cy="16" r="2" fill="#2563EB"/>
  
  <!-- Center dot (represents AI core / focus point) -->
  <circle cx="24" cy="24" r="4" fill="url(#centerGradient)"/>
  
  <!-- Subtle connecting arcs -->
  <circle cx="24" cy="24" r="8" stroke="#3B82F6" stroke-width="0.5" fill="none" opacity="0.3"/>
  <circle cx="24" cy="24" r="16" stroke="#60A5FA" stroke-width="0.5" fill="none" opacity="0.2"/>
  
  <defs>
    <radialGradient id="centerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
  </defs>
</svg>
