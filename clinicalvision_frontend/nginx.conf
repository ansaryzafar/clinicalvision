# ClinicalVision AI - Nginx Configuration
# Production-grade reverse proxy and static file serving

# Upstream backend API
upstream backend_api {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # Security Headers (HIPAA/SOC2 Compliant)
    # ==========================================================================
    
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:* https://api.clinicalvision.ai;" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ==========================================================================
    # Gzip Compression
    # ==========================================================================
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;
    gzip_comp_level 6;

    # ==========================================================================
    # Static File Caching (with cache-busting support)
    # ==========================================================================
    
    # JavaScript and CSS files with hash in filename - cache for 1 year
    # These files have content hashes (e.g., main.abc123.js) so safe to cache long-term
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }
    
    # Images and fonts - cache for 1 month (balance between caching and updates)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
    
    # HTML files - no caching (always get fresh version to pick up new JS/CSS)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }
    
    # Service worker and manifest - minimal caching
    location ~* (service-worker\.js|manifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================================================
    # API Proxy
    # ==========================================================================
    
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for large image uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Max upload size (for mammogram images)
        client_max_body_size 100M;
    }

    # Health endpoint for API
    location /health/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Inference endpoint (may need longer timeout for ML inference)
    location /inference/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Extended timeout for ML inference
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Large file upload support
        client_max_body_size 100M;
    }

    # ==========================================================================
    # Health Check (for container orchestration)
    # ==========================================================================
    
    location = /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # ==========================================================================
    # SPA Routing (React Router support)
    # ==========================================================================
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================================
    # Error Pages
    # ==========================================================================
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ==========================================================================
    # Deny Access to Hidden Files
    # ==========================================================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

